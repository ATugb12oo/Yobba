<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yobba — Cross-Chain DEX Aggregator | Sui & Solana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c12;
      --bg-card: #12151f;
      --bg-elevated: #1a1e2c;
      --border: #2a3040;
      --text: #e6eaf2;
      --text-muted: #8b92a8;
      --accent-cyan: #00d4aa;
      --accent-magenta: #c84ef6;
      --accent-amber: #f5a623;
      --gradient-1: linear-gradient(135deg, #00d4aa 0%, #00a8cc 100%);
      --gradient-2: linear-gradient(135deg, #c84ef6 0%, #6c5ce7 100%);
      --shadow-glow: 0 0 40px rgba(0, 212, 170, 0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 12, 18, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--accent-magenta);
      -webkit-text-fill-color: var(--accent-magenta);
    }

    nav {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      transition: color 0.2s, background 0.2s;
    }

    nav a:hover, nav a.active {
      color: var(--accent-cyan);
      background: rgba(0, 212, 170, 0.08);
    }

    .wallet-btn {
      font-family: inherit;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-cyan);
      background: transparent;
      color: var(--accent-cyan);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .wallet-btn:hover {
      background: rgba(0, 212, 170, 0.12);
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      padding: 3rem 0 2rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
      background: linear-gradient(180deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 560px;
      margin: 0 auto 2rem;
    }

    .chains-pill {
      display: inline-flex;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .chains-pill strong { color: var(--accent-cyan); }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-glow);
    }

    .card-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .swap-section {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .swap-section { grid-template-columns: 1fr; }
    }

    .token-row {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .token-row input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.25rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .token-row input::placeholder {
      color: var(--text-muted);
    }

    .token-row input:focus {
      outline: none;
    }

    .token-select {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .token-select:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .swap-arrow {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
      margin: 0 auto;
    }

    .swap-arrow:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      transform: rotate(180deg);
    }

    .chain-select-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .chain-select-row label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .chain-select-row select {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .quote-summary {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--bg-deep);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .quote-summary div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .quote-summary .value {
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    .quote-summary .value.highlight {
      color: var(--accent-cyan);
    }

    .btn-primary {
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--gradient-1);
      color: var(--bg-deep);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .bridge-section {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .bridge-section .card-title {
      margin-bottom: 0.75rem;
    }

    .bridge-form {
      display: grid;
      gap: 1rem;
      max-width: 480px;
    }

    .bridge-form label {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .bridge-form input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
    }

    .bridge-form input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .tabs button {
      padding: 0.75rem 1.25rem;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.95rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tabs button:hover {
      color: var(--text);
    }

    .tabs button.active {
      color: var(--accent-cyan);
      border-bottom-color: var(--accent-cyan);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .route-steps {
      margin-top: 1rem;
    }

    .route-step-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .route-step-item:last-child { border-bottom: none; }

    .route-step-item .dex {
      color: var(--accent-magenta);
      font-weight: 600;
    }

    .route-step-item .amount {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      margin-left: auto;
    }

    .alert {
      padding: 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .alert.info {
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.3);
      color: var(--accent-cyan);
    }

    .alert.error {
      background: rgba(245, 166, 35, 0.1);
      border: 1px solid rgba(245, 166, 35, 0.3);
      color: var(--accent-amber);
    }

    .alert.success {
      background: rgba(0, 212, 170, 0.12);
      border: 1px solid rgba(0, 212, 170, 0.4);
      color: var(--accent-cyan);
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    footer a {
      color: var(--accent-cyan);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: var(--accent-amber);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .slippage-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .slippage-row label {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .slippage-row select {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 0.4rem 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .history-table th,
    .history-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .history-table th {
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .history-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .history-table .type-swap { color: var(--accent-cyan); }
    .history-table .type-bridge { color: var(--accent-magenta); }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      max-width: 420px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.25rem;
      line-height: 1;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .token-list {
      max-height: 320px;
      overflow-y: auto;
    }

    .token-list button {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.95rem;
    }

    .token-list button:hover {
      border-color: var(--border);
      background: var(--bg-deep);
    }

    .api-base-input {
      width: 100%;
      padding: 0.5rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .api-base-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .settings-section {
      margin-bottom: 1.5rem;
    }

    .settings-section h4 {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .text-muted { color: var(--text-muted); }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-sui { background: rgba(0, 212, 170, 0.2); color: var(--accent-cyan); }
