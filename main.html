<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yobba — Cross-Chain DEX Aggregator | Sui & Solana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0c12;
      --bg-card: #12151f;
      --bg-elevated: #1a1e2c;
      --border: #2a3040;
      --text: #e6eaf2;
      --text-muted: #8b92a8;
      --accent-cyan: #00d4aa;
      --accent-magenta: #c84ef6;
      --accent-amber: #f5a623;
      --gradient-1: linear-gradient(135deg, #00d4aa 0%, #00a8cc 100%);
      --gradient-2: linear-gradient(135deg, #c84ef6 0%, #6c5ce7 100%);
      --shadow-glow: 0 0 40px rgba(0, 212, 170, 0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 12, 18, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--accent-magenta);
      -webkit-text-fill-color: var(--accent-magenta);
    }

    nav {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      transition: color 0.2s, background 0.2s;
    }

    nav a:hover, nav a.active {
      color: var(--accent-cyan);
      background: rgba(0, 212, 170, 0.08);
    }

    .wallet-btn {
      font-family: inherit;
      padding: 0.6rem 1.2rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--accent-cyan);
      background: transparent;
      color: var(--accent-cyan);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .wallet-btn:hover {
      background: rgba(0, 212, 170, 0.12);
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      padding: 3rem 0 2rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
      background: linear-gradient(180deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 560px;
      margin: 0 auto 2rem;
    }

    .chains-pill {
      display: inline-flex;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .chains-pill strong { color: var(--accent-cyan); }
